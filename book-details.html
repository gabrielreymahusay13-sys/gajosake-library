  <!-- rating stars populated by JS -->
</div>

</div>
<div class="grid grid-cols-2 gap-8 mb-8 py-6 border-y border-slate-100 dark:border-slate-700">
<div>
<p class="text-xs uppercase tracking-wider text-mid-grey dark:text-slate-400 mb-1">Year Published</p>
<p id="book-year" class="text-lg font-semibold text-deep-charcoal dark:text-white"></p>
</div>
<div>
<p class="text-xs uppercase tracking-wider text-mid-grey dark:text-slate-400 mb-1">Genre</p>
<p id="book-genre" class="text-lg
 font-semibold text-deep-charcoal dark:text-slate-200"></p>
</div>
</div>
<div class="mb-10">
<button id="read-now" class="bg-primary hover:bg-book-brown text-white px-8 py-4 rounded-md font-serif font-bold text-lg transition-all transition-colors shadow-lg">
<span class="material-symbols-outlined">menu_book</span>
                            Read Now
                        </button>
</div>
<div class="flex-1">
  <p id="book-summary" class="text-mid-grey dark:text-slate-400 text-xl md:text-2xl leading-relaxed"></p>
</div>  

</div>
</div>
</div>
</div>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const data = JSON.parse(localStorage.getItem('selectedBook') || '{}');
  if (!data.title) {
    document.getElementById('book-title').textContent = 'No book selected';
    return;
  }
  document.getElementById('breadcrumb-title').textContent = data.title;
  document.getElementById('book-title').textContent = data.title;
  document.getElementById('book-author').textContent = data.author;
  document.getElementById('book-year').textContent = data.date;
  document.getElementById('book-genre').textContent = data.genre;
  document.getElementById('book-summary').textContent = data.summary;
  const cover = document.getElementById('book-cover');
  if (cover) {
      cover.style.backgroundImage = `url('${data.img || ''}')`;
  }
  const readBtn = document.getElementById('read-now');
  if (readBtn && data.link) {
    readBtn.addEventListener('click', () => {
      const targetLink = (data.title === 'Divergent')
        ? 'https://online.fliphtml5.com/jiqdt/peqd/#p=1'
        : (data.title === 'The Fault in Our Stars')
          ? 'https://fliphtml5.com/xkmhv/nfim/The_Fault_In_Our_Stars/'
          : (data.title === 'The Hobbit')
            ? 'https://fliphtml5.com/lnym/sewm/THE_HOBBIT/'
            : (data.title === 'Pride and Prejudice')
              ? 'https://fliphtml5.com/pdgkw/vdlr/Pride_and_Prejudice/'
              : (data.title === 'The Adventures of Sherlock Holmes')
                ? 'https://fliphtml5.com/djpgr/whvx/The_Adventures_of_Sherlock_Holmes/'
                : (data.title === 'Gone Girl')
                  ? 'https://fliphtml5.com/fxqlq/ltxd/gone_girl/'
                  : (data.title === 'The Hunger Games')
                    ? 'https://fliphtml5.com/lisrr/oyfx/The_Hunger_Games/'
                    : (data.title === 'Noli Me Tangere')
                      ? 'https://fliphtml5.com/tascy/eryx/Noli_Me_Tangere/'
                      : data.link;
      window.open(targetLink, '_blank');
    });
  }
  const ratingContainer = document.getElementById('book-rating');
  if (ratingContainer) {
    const fullStars = Math.floor(data.rating);
    const half = data.rating - fullStars >= 0.5;
    ratingContainer.innerHTML = '';
    for (let i = 0; i < fullStars; i++) {
      const span = document.createElement('span');
      span.className = 'material-symbols-outlined fill-1';
      span.textContent = 'star';
      ratingContainer.appendChild(span);
    }
    if (half) {
      const halfSpan = document.createElement('span');
      halfSpan.className = 'material-symbols-outlined';
      halfSpan.textContent = 'star_half';
      ratingContainer.appendChild(halfSpan);
    }
    const num = document.createElement('span');
    num.className='text-mid-grey dark:text-slate-400 text-sm font-semibold ml-1';
    num.textContent = data.rating.toFixed(1) + ' / 5.0';
    ratingContainer.appendChild(num);
  }

});
</script>
